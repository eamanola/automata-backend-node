allowBuilds:
  automata-app: true
  automata-cache: true
  automata-db: true
  automata-rest: true
  automata-user-management: true
  automata-utils: true

  bcrypt: true
  better-sqlite3: true
  mongodb-memory-server: true
  unrs-resolver: true
  esbuild: true

# hmmm
blockExoticSubdeps: false

# local dev
# rm -rf node_modules && pnpm i to update
# pnpm up overrides package.json paths / comment these on up call
overrides:
  automata-app: "file:./automata/automata-app"
  automata-cache: "file:./automata/automata-cache"
  automata-db: "file:./automata/automata-db"
  automata-rest: "file:./automata/automata-rest"
  automata-user-management: "file:./automata/automata-user-management"
  automata-utils: "file:./automata/automata-utils"
