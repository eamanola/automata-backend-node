allowBuilds:
  automata-app: true
  automata-cache: true
  automata-db: true
  automata-rest: true
  automata-user-management: true
  automata-utils: true

  bcrypt: true
  better-sqlite3: true
  mongodb-memory-server: true
  unrs-resolver: true
  esbuild: true

